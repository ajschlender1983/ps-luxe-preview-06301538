<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Split compare — Psychic Source (A/B)</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#0e0a20;font-family:'Jost',system-ui,sans-serif}
  .split{display:flex;height:100vh;width:100%}
  .pane{position:relative;flex:1;min-width:0;height:100%;overflow:hidden;border-right:1px solid rgba(233,207,154,.20)}
  .pane:last-child{border-right:0}
  .pane iframe{width:100%;height:100%;border:0;display:block;background:#0e0a20}
  .pane .scroll{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;background:#15102a}
  .pane .scroll img{display:block;width:100%}
  .plabel{position:absolute;top:14px;left:14px;z-index:5;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#F7F2E8;background:rgba(18,12,38,.74);border:1px solid rgba(233,207,154,.32);padding:6px 12px;border-radius:999px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .plabel.live{color:#E9CF9A}
  .plabel.live a{color:#E9CF9A;text-decoration:none;font-weight:500}
  .plabel.live a:hover{text-decoration:underline}
  /* A/B compare bar */
  .ab-bar{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:2147483647;display:flex;align-items:center;gap:2px;padding:5px;border-radius:999px;background:rgba(18,12,38,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(233,207,154,.4);box-shadow:0 12px 44px rgba(0,0,0,.6)}
  .ab-grp{display:flex;align-items:center;gap:2px}
  .ab-div{width:1px;height:20px;background:rgba(233,207,154,.28);margin:0 6px}
  .ab-btn{font-size:12.5px;letter-spacing:.02em;color:#F7F2E8;text-decoration:none;padding:7px 15px;border-radius:999px;transition:background .22s,color .22s;white-space:nowrap;cursor:pointer}
  .ab-btn:hover{background:rgba(255,255,255,.09)}
  .ab-btn.is-active{background:linear-gradient(120deg,#E9CF9A,#C9A86A);color:#1a1230;font-weight:500}
  @media(max-width:760px){.split{flex-direction:column}.pane{border-right:0;border-bottom:1px solid rgba(233,207,154,.20)}.ab-bar{bottom:12px;gap:0;padding:4px}.ab-btn{padding:6px 10px;font-size:11.5px}.ab-div{margin:0 3px}}
</style>
</head>
<body>
  <div class="split">
    <div class="pane">
      <span class="plabel">Redesign</span>
      <iframe id="fL" title="Redesign"></iframe>
    </div>
    <div class="pane">
      <span class="plabel live">Original · <a id="liveLink" href="#" target="_blank" rel="noopener">live ↗</a></span>
      <div class="scroll" id="scR"><img id="imgR" alt="Original live site" /></div>
    </div>
  </div>
  <div class="ab-bar">
    <div class="ab-grp">
      <a class="ab-btn" data-page="home">Home</a>
      <a class="ab-btn" data-page="listing">Psychics</a>
    </div>
    <span class="ab-div"></span>
    <div class="ab-grp">
      <a class="ab-btn" data-mode="redesign">Redesign</a>
      <a class="ab-btn" data-mode="split">Split</a>
      <a class="ab-btn" data-mode="original">Original</a>
    </div>
  </div>
<script>
(function(){
  var MAP={home:{re:'index.html',img:'assets/original/home.jpg',live:'https://www.psychicsource.com/'},
           listing:{re:'advisors.html',img:'assets/original/listing.jpg',live:'https://www.psychicsource.com/our-psychics'}};
  var RE={home:'index.html',listing:'advisors.html'};
  var p=(new URLSearchParams(location.search).get('p'))||'home'; if(!MAP[p])p='home';
  var m=MAP[p];
  var fL=document.getElementById('fL'), scR=document.getElementById('scR'), imgR=document.getElementById('imgR');
  document.getElementById('liveLink').href=m.live;
  imgR.src=m.img;
  fL.src=m.re+'?embed=1';

  // --- compare bar wiring ---
  function url(page,mode){ if(mode==='redesign')return RE[page]; if(mode==='original')return 'original.html?p='+page; return 'compare.html?p='+page; }
  try{localStorage.setItem('abPage',p);localStorage.setItem('abView','split');}catch(e){}
  var bar=document.querySelector('.ab-bar');
  bar.querySelectorAll('[data-page]').forEach(function(a){var pg=a.getAttribute('data-page');a.href=url(pg,'split');a.classList.toggle('is-active',pg===p);});
  bar.querySelectorAll('[data-mode]').forEach(function(a){var mo=a.getAttribute('data-mode');a.href=url(p,mo);a.classList.toggle('is-active',mo==='split');});

  // --- synced scroll (proportional) ---
  var lock=false;
  function release(){requestAnimationFrame(function(){lock=false;});}
  function leftWin(){try{return fL.contentWindow;}catch(e){return null;}}
  function leftMax(w){var d=w.document,se=d.scrollingElement||d.documentElement;return Math.max(0,se.scrollHeight-w.innerHeight);}
  function rightMax(){return Math.max(0,scR.scrollHeight-scR.clientHeight);}

  fL.addEventListener('load',function(){
    var w=leftWin(); if(!w)return;
    try{
      w.addEventListener('scroll',function(){
        if(lock)return;lock=true;
        var lm=leftMax(w); var f=lm>0?(w.scrollY||w.pageYOffset)/lm:0;
        scR.scrollTop=f*rightMax();
        release();
      },{passive:true});
    }catch(e){/* cross-origin: sync unavailable (only on file://) */}
  });
  scR.addEventListener('scroll',function(){
    if(lock)return;lock=true;
    var f=rightMax()>0?scR.scrollTop/rightMax():0;
    var w=leftWin();
    if(w){try{w.scrollTo(0,f*leftMax(w));}catch(e){}}
    release();
  },{passive:true});

  // --- carry scroll fraction to/from the other views ---
  function splitFrac(){var rm=rightMax();return rm>0?scR.scrollTop/rm:0;}
  bar.addEventListener('click',function(e){var t=e.target;while(t&&t!==bar){if(t.classList&&t.classList.contains('ab-btn')){try{sessionStorage.setItem('abCarry',splitFrac().toFixed(4));}catch(_){}break;}t=t.parentNode;}},true);
  var carry=null;try{carry=sessionStorage.getItem('abCarry');}catch(_){}
  if(carry!=null){try{sessionStorage.removeItem('abCarry');}catch(_){}
    var cf=parseFloat(carry);
    if(cf>0.002){
      var applyCarry=function(){lock=true;scR.scrollTop=cf*rightMax();var w=leftWin();if(w){try{w.scrollTo(0,cf*leftMax(w));}catch(_){}}release();};
      imgR.addEventListener('load',function(){setTimeout(applyCarry,60);});
      fL.addEventListener('load',function(){setTimeout(applyCarry,150);});
      setTimeout(applyCarry,450);setTimeout(applyCarry,850);
    }
  }
})();
</script>
</body>
</html>
