<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Original — Psychic Source (A/B)</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#15102a;font-family:'Jost',system-ui,sans-serif}
  .orig-shot{display:block;width:100%;max-width:1450px;margin:0 auto;box-shadow:0 0 80px rgba(0,0,0,.5)}
  .orig-note{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:2147483646;font-size:12px;letter-spacing:.02em;color:rgba(247,242,232,.85);background:rgba(18,12,38,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(233,207,154,.28);padding:8px 18px;border-radius:999px;box-shadow:0 8px 30px rgba(0,0,0,.4);white-space:nowrap}
  .orig-note a{color:#E9CF9A;text-decoration:none;font-weight:500}
  .orig-note a:hover{text-decoration:underline}
  /* A/B compare bar */
  .ab-bar{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:2147483647;display:flex;align-items:center;gap:2px;padding:5px;border-radius:999px;background:rgba(18,12,38,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(233,207,154,.38);box-shadow:0 12px 44px rgba(0,0,0,.55)}
  .ab-grp{display:flex;align-items:center;gap:2px}
  .ab-div{width:1px;height:20px;background:rgba(233,207,154,.28);margin:0 6px}
  .ab-btn{font-size:12.5px;letter-spacing:.02em;color:#F7F2E8;text-decoration:none;padding:7px 15px;border-radius:999px;transition:background .22s,color .22s;white-space:nowrap;cursor:pointer}
  .ab-btn:hover{background:rgba(255,255,255,.09)}
  .ab-btn.is-active{background:linear-gradient(120deg,#E9CF9A,#C9A86A);color:#1a1230;font-weight:500}
  @media(max-width:640px){.ab-bar{bottom:12px;gap:0;padding:4px}.ab-btn{padding:6px 10px;font-size:11.5px}.ab-div{margin:0 3px}.orig-note{font-size:11px;padding:7px 13px}}
</style>
</head>
<body>
  <div class="orig-note">Current live site &nbsp;·&nbsp; <a id="liveLink" href="https://www.psychicsource.com/" target="_blank" rel="noopener">open live site ↗</a></div>
  <img class="orig-shot" id="shot" src="assets/original/home.jpg" alt="Original psychicsource.com" />
  <div class="ab-bar">
    <div class="ab-grp">
      <a class="ab-btn" href="command-center.html">Home</a>
      <a class="ab-btn" data-page="listing">Psychics</a>
    </div>
    <span class="ab-div"></span>
    <div class="ab-grp">
      <a class="ab-btn" data-mode="redesign">Redesign</a>
      <a class="ab-btn" data-mode="original">Original</a>
    </div>
  </div>
<script>
(function(){
  var MAP={home:{img:'assets/original/home.jpg',live:'https://www.psychicsource.com/'},
           listing:{img:'assets/original/listing.jpg',live:'https://www.psychicsource.com/our-psychics'}};
  var RE={home:'index.html',listing:'advisors.html'};
  var p=(new URLSearchParams(location.search).get('p'))||'home'; if(!MAP[p])p='home';
  document.getElementById('shot').src=MAP[p].img;
  document.getElementById('liveLink').href=MAP[p].live;
  function url(page,mode){ if(mode==='redesign')return RE[page]; if(mode==='original')return 'original.html?p='+page; return 'compare.html?p='+page; }
  try{localStorage.setItem('abPage',p);localStorage.setItem('abView','original');}catch(e){}
  var bar=document.querySelector('.ab-bar');
  bar.querySelectorAll('[data-page]').forEach(function(a){var pg=a.getAttribute('data-page');a.href=url(pg,'original');a.classList.toggle('is-active',pg===p);});
  bar.querySelectorAll('[data-mode]').forEach(function(a){var m=a.getAttribute('data-mode');a.href=url(p,m);a.classList.toggle('is-active',m==='original');});
  // carry scroll position across A/B toggles so you stay at ~the same section
  function frac(){var h=Math.max(1,(document.documentElement.scrollHeight||0)-window.innerHeight);return Math.min(1,Math.max(0,(window.pageYOffset||document.documentElement.scrollTop||0)/h));}
  bar.addEventListener('click',function(e){var t=e.target;while(t&&t!==bar){if(t.classList&&t.classList.contains('ab-btn')){try{sessionStorage.setItem('abCarry',frac().toFixed(4));}catch(_){}break;}t=t.parentNode;}},true);
  var c=null;try{c=sessionStorage.getItem('abCarry');}catch(_){}
  if(c!=null){try{sessionStorage.removeItem('abCarry');}catch(_){}
    var f=parseFloat(c);
    if(f>0.002){
      if('scrollRestoration' in history){try{history.scrollRestoration='manual';}catch(_){}}
      var go=function(){var h=Math.max(1,(document.documentElement.scrollHeight||0)-window.innerHeight);window.scrollTo(0,f*h);};
      var shot=document.getElementById('shot');
      if(shot){shot.addEventListener('load',function(){setTimeout(go,60);});}
      setTimeout(go,140);
      window.addEventListener('load',function(){setTimeout(go,140);setTimeout(go,460);});
    }
  }
})();
</script>
</body>
</html>
